name: Build and Publish Dist to Production Branch

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Show repo structure
        run: |
          echo "🔍 Listing repo structure..."
          ls -R .

      - name: Install dependencies (AUTO DETECT)
        run: |
          echo "🔍 Detecting Vite project location..."
          if [ -f "./frontend/package.json" ]; then
            echo "📁 Vite project found in /frontend"
            cd frontend && npm install
          elif [ -f "./package.json" ]; then
            echo "📁 Vite project found in root"
            npm install
          else
            echo "❌ No package.json found. Cannot install deps."
            exit 1
          fi

      - name: Build Vite project (AUTO DETECT)
        run: |
          if [ -f "./frontend/package.json" ]; then
            echo "🚀 Building Vite project in /frontend"
            cd frontend && npm run build
          else
            echo "🚀 Building Vite project in root"
            npm run build
          fi

      - name: Prepare dist folder (AUTO DETECT)
        run: |
          rm -rf dist-push
          mkdir dist-push
          
          if [ -d "./frontend/dist" ]; then
            echo "📦 Copying frontend/dist"
            cp -r frontend/dist/* dist-push/
          elif [ -d "./dist" ]; then
            echo "📦 Copying root dist"
            cp -r dist/* dist-push/
          else
            echo "❌ No dist folder found — build failed"
            exit 1
          fi

          echo "📁 Final dist-push contents:"
          ls -R dist-push

      - name: Push dist to production branch
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git fetch origin production || true
          git checkout production || git checkout -b production

          rm -rf ./*
          cp -r ../dist-push/* .

          git add .
          git commit -m "Production build: $(date)" || echo "⚠️ No changes"
          
          # FIX: Must include GitHub username in push URL
          git push https://AILifeBOT:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }} production --force
