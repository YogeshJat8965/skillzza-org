name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build Vite
        run: |
          cd frontend
          npm run build

      - name: Prepare dist
        run: |
          rm -rf dist-push
          mkdir dist-push
          cp -r frontend/dist/* dist-push/
          echo "❇️ dist-push contents:"
          ls -R dist-push

      - name: Deploy to production
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git fetch origin production || true
          git checkout production || git checkout -b production

          echo "🧹 Clearing old production files"
          rm -rf ./*

          echo "📦 Copying new build files"
          cp -r dist-push/* .   # << FIXED (NO ../) !!!

          git add .
          git commit -m "Deploy $(date)" || echo "No changes"
          git push https://AILifeBOT:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }} production --force
