name: Build and Deploy to Production Branch

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build Vite project
        run: |
          cd frontend
          npm run build

      - name: Prepare dist folder
        run: |
          rm -rf dist-push
          mkdir dist-push
          cp -r frontend/dist/* dist-push/

      - name: Push dist to production branch
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git fetch origin production || true
          git checkout production || git checkout -b production

          rm -rf ./*
          cp -r ../dist-push/* .

          git add .
          git commit -m "Production build: $(date)" || echo "No changes"

          # MUST include GitHub username for classic PAT
          git push https://AILifeBOT:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }} production --force
