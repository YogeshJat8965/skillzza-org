name: DEBUG Build and Publish

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List repo structure
        run: |
          echo "🟦 ROOT DIR CONTENTS:"
          ls -R .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: |
          echo "🟦 Checking frontend folder:"
          ls -R frontend || echo "❌ NO frontend folder"
          
          echo "🟧 Installing dependencies inside frontend"
          cd frontend
          npm install
          echo "🟩 FINISHED installing dependencies"

      - name: Build project
        run: |
          echo "🟧 Running build"
          cd frontend
          npm run build || (echo "❌ BUILD FAILED" && exit 1)
          echo "🟩 BUILD COMPLETED"
          
          echo "🟦 Checking dist folder:"
          ls -R dist || echo "❌ NO dist folder generated"

      - name: Copy dist
        run: |
          rm -rf dist-push
          mkdir dist-push
          
          echo "🟦 Copying frontend/dist → dist-push"
          cp -r frontend/dist/* dist-push/ || (echo "❌ COPY FAILED — DIST DOES NOT EXIST" && exit 1)

          echo "🟩 dist-push contains:"
          ls -R dist-push

      - name: Exit for now (we only debug)
        run: |
          echo "🟩 DEBUG COMPLETE — DO NOT DEPLOY YET"
          exit 0
