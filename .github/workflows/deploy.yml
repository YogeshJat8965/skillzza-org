name: Deploy React Vite App to Hostinger (FTP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies (inside frontend/)
        run: |
          cd frontend
          npm install

      - name: Build Vite App (inside frontend/)
        run: |
          cd frontend
          npm run build

      - name: Deploy dist/ via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: "ftp"
          port: 21
          local-dir: "frontend/dist"
          server-dir: ${{ secrets.FTP_DIR }}
