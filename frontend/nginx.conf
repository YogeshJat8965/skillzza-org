# Nginx configuration for serving the app from /newsite/ base path

server {
    listen 80;
    server_name yourdomain.com;
    root /var/www/html;

    # Serve files from /newsite/ path
    location /newsite/ {
        alias /var/www/html/newsite/;
        try_files $uri $uri/ /newsite/index.html;

        # MIME types
        include /etc/nginx/mime.types;

        # Cache static assets for 1 year (immutable = browser never re-requests these)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|avif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            # Allow cross-origin for fonts
            add_header Access-Control-Allow-Origin "*";
        }
    }

    # Gzip compression — covers HTML, CSS, JS, JSON, XML, SVG, and fonts
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml
        font/ttf
        font/woff
        font/woff2
        application/font-woff2;
}
